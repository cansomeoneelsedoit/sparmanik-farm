<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Clear cache · Sparmanik Farm</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <style>
      :root { color-scheme: light dark; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; }
      body { display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #fafaf9; color: #1c1917; }
      @media (prefers-color-scheme: dark) { body { background: #0c0a09; color: #fafaf9; } .card { background: #1c1917 !important; border-color: #292524 !important; } }
      .card { width: min(420px, 90vw); padding: 28px; border-radius: 12px; background: #fff; border: 1px solid #e7e5e4; box-shadow: 0 6px 20px rgba(0,0,0,0.06); text-align: center; }
      .icon { width: 56px; height: 56px; border-radius: 999px; background: #fef3c7; display: flex; align-items: center; justify-content: center; font-size: 28px; margin: 0 auto 12px; }
      h1 { font: 600 22px/1.2 ui-serif, Georgia, serif; margin: 4px 0 6px; }
      p { margin: 6px 0; color: #78716c; font-size: 13px; }
      kbd { font: 500 11px/1 ui-monospace, monospace; background: #f5f5f4; border: 1px solid #e7e5e4; border-radius: 4px; padding: 2px 6px; }
      @media (prefers-color-scheme: dark) { kbd { background: #292524; border-color: #44403c; color: #e7e5e4; } }
      a { color: #0ea5e9; text-decoration: none; font-size: 13px; }
      a:hover { text-decoration: underline; }
      #status { font-weight: 500; color: #0ea5e9; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon">🧹</div>
      <h1>Clearing browser cache</h1>
      <p id="status">Working…</p>
      <p style="margin-top: 18px;">
        If this hangs for more than 5 seconds, press
        <kbd>Ctrl</kbd>+<kbd>Shift</kbd>+<kbd>R</kbd> to force a hard refresh.
      </p>
      <p style="margin-top: 14px;">
        <a href="/?_t=manual" id="manual-link">Skip and reload now</a>
      </p>
    </div>
    <script>
      // Plain JS — runs without any framework / module resolution.
      // Bulletproof escape hatch when Turbopack chunks are stale.
      (async function () {
        var setStatus = function (s) {
          var el = document.getElementById('status');
          if (el) el.textContent = s;
        };
        try {
          setStatus('Clearing Cache Storage…');
          if ('caches' in window) {
            var names = await caches.keys();
            await Promise.all(names.map(function (n) { return caches.delete(n); }));
          }
          setStatus('Unregistering service workers…');
          if ('serviceWorker' in navigator) {
            var regs = await navigator.serviceWorker.getRegistrations();
            await Promise.all(regs.map(function (r) { return r.unregister(); }));
          }
          setStatus('Wiping local + session storage…');
          try { localStorage.clear(); } catch (e) {}
          try { sessionStorage.clear(); } catch (e) {}
          setStatus('Reloading…');
        } catch (e) {
          setStatus('Manual refresh required — error: ' + (e && e.message ? e.message : e));
        }
        // Bounce to / with a cache-busting query param. Use replace so the
        // back button doesn't return them here.
        setTimeout(function () {
          window.location.replace('/?_t=' + Date.now());
        }, 700);
      })();
    </script>
  </body>
</html>
