name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Prisma needs a valid-looking URL even when we're only generating the
      # client. The CI Postgres service below uses the same credentials.
      DATABASE_URL: postgresql://sparmanik:sparmanik@localhost:5432/sparmanik?schema=public
      DATABASE_SSL: "false"
      AUTH_SECRET: ci-secret
      AUTH_URL: http://localhost:3000
      NEXT_TELEMETRY_DISABLED: "1"

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: sparmanik
          POSTGRES_PASSWORD: sparmanik
          POSTGRES_DB: sparmanik
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sparmanik -d sparmanik"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
