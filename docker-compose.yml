services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: sparmanik
      POSTGRES_PASSWORD: sparmanik
      POSTGRES_DB: sparmanik
    ports:
      - "5432:5432"
    volumes:
      - sparmanik-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sparmanik -d sparmanik"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    # Load credentials (ANTHROPIC_API_KEY, GEMINI_API_KEY, AUTH_SECRET,
    # FARM_API_TOKEN) directly from .env into the container — bypassing the
    # `${VAR:-}` shell-interpolation path that lets an empty host-shell
    # variable override the file's real value. The Claude Code session
    # exports an empty ANTHROPIC_API_KEY for its own credential management,
    # which is what was making Ask AI + receipt OCR fail locally despite
    # the key being present in .env.
    env_file:
      - .env
    environment:
      # `db` (the postgres service above) is only reachable on the docker
      # network, not from the host shell. Define it here so it overrides
      # the localhost-based DATABASE_URL the host shell uses for
      # `npm run dev` outside compose.
      DATABASE_URL: postgresql://sparmanik:sparmanik@db:5432/sparmanik?schema=public
      DATABASE_SSL: "false"
      AUTH_URL: http://localhost:3000
      AUTH_TRUST_HOST: "true"
      UPLOAD_DIR: /app/uploads
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
    volumes:
      # Mount source for hot reload, but preserve container-side node_modules
      # and .next so they don't get clobbered by the host bind mount.
      - .:/app
      - /app/node_modules
      - /app/.next

volumes:
  sparmanik-db:
