services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: sparmanik
      POSTGRES_PASSWORD: sparmanik
      POSTGRES_DB: sparmanik
    ports:
      - "5432:5432"
    volumes:
      - sparmanik-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sparmanik -d sparmanik"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      # Host `db` is the postgres service above; the web service talks to it
      # over the docker network.
      DATABASE_URL: postgresql://sparmanik:sparmanik@db:5432/sparmanik?schema=public
      DATABASE_SSL: "false"
      AUTH_SECRET: ${AUTH_SECRET:-dev-secret-change-me}
      AUTH_URL: http://localhost:3000
      AUTH_TRUST_HOST: "true"
      UPLOAD_DIR: /app/uploads
      FARM_API_TOKEN: ${FARM_API_TOKEN:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
    volumes:
      # Mount source for hot reload, but preserve container-side node_modules
      # and .next so they don't get clobbered by the host bind mount.
      - .:/app
      - /app/node_modules
      - /app/.next

volumes:
  sparmanik-db:
